name = "happy-adoptions-ai"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
NEXT_PUBLIC_APP_URL = "https://adoptions.happyfactory.app"
EMAIL_FROM = "Happy Factory <admin@happyfactory.app>"

[[routes]]
pattern = "adoptions.happyfactory.app"
zone_name = "happyfactory.app"
custom_domain = true

[env.dev]
name = "happy-adoptions-dev"

[env.dev.vars]
NEXT_PUBLIC_APP_URL = "https://adoptions-dev.happyfactory.app"
NEXT_PUBLIC_ENABLE_TEST_LOGIN = "true"
EMAIL_FROM = "Happy Factory <admin@happyfactory.app>"

[[env.dev.routes]]
pattern = "adoptions-dev.happyfactory.app"
zone_name = "happyfactory.app"
custom_domain = true
